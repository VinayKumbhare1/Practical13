<!DOCTYPE html>
<html>
<head>
    <title>Responsive Bootstrap Site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">My Site</a>
    </div>
</nav>

<div class="container mt-3">
    <nav>
        <ol class="breadcrumb">
            <li class="breadcrumb-item">Home</li>
            <li class="breadcrumb-item active">Page</li>
        </ol>
    </nav>
</div>

<div class="container">
    <div class="dropdown mb-3">
        <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
            Dropdown
        </button>
        <ul class="dropdown-menu">
            <li><a class="dropdown-item">Option 1</a></li>
            <li><a class="dropdown-item">Option 2</a></li>
        </ul>
    </div>
</div>

<div class="container">
    <form>
        <input type="text" class="form-control mb-2" placeholder="Enter Name">
        <input type="email" class="form-control mb-2" placeholder="Enter Email">
        <button class="btn btn-success">Submit</button>
    </form>
</div>

<div class="container mt-3">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">
        Open Modal
    </button>
</div>

<div class="modal fade" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Modal Title</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                This is a modal box.
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
